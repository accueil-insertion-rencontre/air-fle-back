version: '3.8'

services:
  api-back-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: air-fle-back-dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    networks:
      - air-fle-network
    command: npm run start:dev
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3001"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  air-fle-network:
    name: air-fle-network
    driver: bridge

volumes:
  node_modules:
